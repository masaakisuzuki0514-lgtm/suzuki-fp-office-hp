<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LINE リッチメニュー生成ツール｜鈴木未来設計FP事務所</title>
<style>
  body {
    background: #f0f4f8;
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
    text-align: center;
    padding: 20px;
  }
  h1 { color: #1a3564; font-size: 18px; margin-bottom: 8px; }
  p { color: #555; font-size: 13px; margin: 4px 0; }
  #preview {
    margin: 16px auto;
    border: 2px solid #c9a84c;
    display: inline-block;
  }
  canvas { display: block; }
  .btn-area { margin: 16px 0; }
  button {
    background: #1a3564;
    color: white;
    border: none;
    padding: 12px 32px;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
    margin: 4px;
  }
  button:hover { background: #c9a84c; }
  .note {
    background: #fff8e1;
    border-left: 4px solid #c9a84c;
    padding: 10px 14px;
    text-align: left;
    max-width: 600px;
    margin: 0 auto;
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>

<h1>LINE リッチメニュー画像生成ツール</h1>
<p>鈴木未来設計FP事務所 / 2500 × 1686 px（LINE公式推奨サイズ）</p>

<div id="preview">
  <canvas id="canvas" width="2500" height="1686" style="width:625px;height:421.5px;"></canvas>
</div>

<div class="btn-area">
  <button onclick="downloadImage()">📥 PNG ダウンロード（実寸 2500×1686px）</button>
</div>

<div class="note">
  <strong>【使い方】</strong><br>
  ① 上の「PNG ダウンロード」ボタンをクリック → <code>line_richmenu.png</code> が保存されます<br>
  ② LINE Official Account Manager → リッチメニュー → 画像をアップロード<br>
  ③ ホームページ・お問い合わせURLが決まったら、このHTMLファイルを編集して再生成できます<br>
  <br>
  <strong>【URLを後から変更するには】</strong><br>
  このHTMLファイルをメモ帳やVSCodeで開き、<code>// ★ここにURL</code> と書かれた行を編集してください
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = 2500;
const H = 1686;
const COLS = 3;
const ROWS = 2;
const cW = Math.floor(W / COLS);   // 833px
const cH = Math.floor(H / ROWS);   // 843px

// ===== ボタン設定（URLは後から変更可能） =====
const BUTTONS = [
  {
    label: 'ホームページ',
    sub: '',
    icon: 'HOME',
    color: '#1e4a8a',
    url: 'https://office-suzuki-fp.netlify.app'
  },
  {
    label: 'Facebook',
    sub: '',
    icon: 'FB',
    color: '#1a3a7a',
    // url: 'https://www.facebook.com/profile.php?id=100028519904409'
  },
  {
    label: 'X (Twitter)',
    sub: '',
    icon: 'X',
    color: '#1e4a8a',
    // url: 'https://x.com/masaaki_souzoku'
  },
  {
    label: 'note',
    sub: '',
    icon: 'NOTE',
    color: '#1a3a7a',
    // url: 'https://note.com/merry_fowl5109'
  },
  {
    label: 'お問い合わせ',
    sub: '（準備中）',
    icon: 'MAIL',
    color: '#1e4a8a',
    // url: 'https://your-contact-form.com'  // ★ここにURL（後で追加）
  },
  {
    label: 'プロフィール',
    sub: '（準備中）',
    icon: 'USER',
    color: '#1a3a7a',
    // url: 'https://your-profile.com'  // ★ここにURL（後で追加）
  },
];

// ===== 描画関数 =====
function drawAll() {
  // 全体背景
  ctx.fillStyle = '#0f2448';
  ctx.fillRect(0, 0, W, H);

  BUTTONS.forEach((btn, i) => {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const x = col * cW;
    const y = row * cH;
    drawCell(ctx, x, y, cW, cH, btn);
  });

  // グリッド線（ゴールド）
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 6;
  // 縦線
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * cW, 0);
    ctx.lineTo(c * cW, H);
    ctx.stroke();
  }
  // 横線
  ctx.beginPath();
  ctx.moveTo(0, cH);
  ctx.lineTo(W, cH);
  ctx.stroke();

  // 外枠
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 14;
  ctx.strokeRect(7, 7, W - 14, H - 14);
}

function drawCell(ctx, x, y, w, h, btn) {
  // セル背景（グラデーション）
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, btn.color);
  grad.addColorStop(1, '#0f2448');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  const cx = x + w / 2;
  const cy = y + h / 2;

  // アイコン描画
  drawIcon(ctx, btn.icon, cx, cy - 130, 160);

  // ラベル
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 110px "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillText(btn.label, cx, cy + 130);
  ctx.shadowBlur = 0;

  // サブラベル（準備中など）
  if (btn.sub) {
    ctx.fillStyle = '#aac4e8';
    ctx.font = '65px "Hiragino Sans", "Yu Gothic", sans-serif';
    ctx.fillText(btn.sub, cx, cy + 265);
  }

  // ゴールドのアクセントライン（下部）
  ctx.fillStyle = '#c9a84c';
  ctx.fillRect(x + 80, y + h - 30, w - 160, 8);
}

function drawIcon(ctx, type, cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);

  const s = size / 2;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 12;

  switch(type) {
    case 'HOME':
      ctx.fillStyle = '#7eb8f5';
      // 屋根
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s, 0);
      ctx.lineTo(-s, 0);
      ctx.closePath();
      ctx.fill();
      // 本体
      ctx.fillStyle = '#5a9de0';
      ctx.fillRect(-s * 0.6, 0, s * 1.2, s * 0.85);
      // ドア
      ctx.fillStyle = '#c9a84c';
      ctx.fillRect(-s * 0.2, s * 0.3, s * 0.4, s * 0.55);
      break;

    case 'FB':
      // Facebookアイコン（青丸 + f）
      ctx.fillStyle = '#1877f2';
      ctx.beginPath();
      ctx.arc(0, 0, s, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 0.85}px Georgia, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('f', s * 0.1, s * 0.05);
      break;

    case 'X':
      // X（旧Twitter）アイコン
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${size * 1.0}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('𝕏', 0, 0);
      break;

    case 'NOTE':
      // note アイコン（角丸長方形 + 横線）
      const rw = s * 1.1, rh = s * 1.3, rr = 18;
      ctx.fillStyle = '#41c9b4';
      roundRect(ctx, -rw/2, -rh/2, rw, rh, rr);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      const lineY = [-rh/4, 0, rh/4];
      lineY.forEach(ly => {
        ctx.fillRect(-rw*0.3, ly - 7, rw * 0.6, 14);
      });
      break;

    case 'MAIL':
      // 封筒アイコン
      ctx.fillStyle = '#c9a84c';
      ctx.fillRect(-s, -s * 0.65, s * 2, s * 1.3);
      ctx.fillStyle = '#0f2448';
      ctx.beginPath();
      ctx.moveTo(-s, -s * 0.65);
      ctx.lineTo(0, s * 0.05);
      ctx.lineTo(s, -s * 0.65);
      ctx.strokeStyle = '#0f2448';
      ctx.lineWidth = 6;
      ctx.stroke();
      break;

    case 'USER':
      // 人物アイコン
      ctx.fillStyle = '#7eb8f5';
      // 頭
      ctx.beginPath();
      ctx.arc(0, -s * 0.35, s * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // 胴体
      ctx.beginPath();
      ctx.arc(0, s * 0.8, s * 0.75, Math.PI, Math.PI * 2);
      ctx.fill();
      break;
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 事務所名を下部に追加
function drawFooter() {
  // 下部帯（装飾）は不要、すっきり仕上げ
}

// 描画実行
drawAll();

// ダウンロード
function downloadImage() {
  const link = document.createElement('a');
  link.download = 'line_richmenu_FPoffice.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
