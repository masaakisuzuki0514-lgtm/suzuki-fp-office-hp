<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サムネイル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0f1e;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a0f1e 0%, #0d1f3c 50%, #0a1628 100%);
  }

  /* 背景の装飾 */
  .bg::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(20, 60, 120, 0.4) 0%, transparent 70%);
  }

  .bg::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(15, 40, 90, 0.5) 0%, transparent 70%);
  }

  /* 左側のアクセントライン */
  .accent-bar {
    position: absolute;
    left: 60px;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 320px;
    background: linear-gradient(180deg, #f5a623 0%, #f7c948 50%, #f5a623 100%);
    border-radius: 3px;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    width: 100%;
    padding: 0 90px 0 100px;
    gap: 60px;
  }

  .text-block {
    flex: 1;
  }

  .tag {
    display: inline-block;
    background: #f5a623;
    color: #0a0f1e;
    font-size: 22px;
    font-weight: 800;
    padding: 6px 18px;
    border-radius: 4px;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }

  .main-text {
    color: #ffffff;
    font-weight: 900;
    line-height: 1.35;
    letter-spacing: 0.02em;
  }

  .line1 {
    font-size: 56px;
    color: #d0dff5;
  }

  .line2 {
    font-size: 56px;
    color: #f5a623;
    text-shadow: 0 0 30px rgba(245, 166, 35, 0.3);
  }

  .line3 {
    font-size: 48px;
    color: #d0dff5;
    margin-top: 6px;
  }

  .line4 {
    font-size: 64px;
    color: #ffffff;
    background: linear-gradient(90deg, #ffffff, #b8cff0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 4px;
  }

  .sub-text {
    margin-top: 28px;
    color: #7a96b8;
    font-size: 22px;
    letter-spacing: 1px;
    font-weight: 500;
  }

  /* 右側のアイコンエリア */
  .icon-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .icon-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a3a6b, #0d2244);
    border: 3px solid rgba(245, 166, 35, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    box-shadow: 0 0 40px rgba(245, 166, 35, 0.15);
  }

  .icon-label {
    color: #f5a623;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    text-align: center;
  }

  /* チェックリスト風装飾 */
  .checklist {
    position: absolute;
    right: 80px;
    bottom: 60px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0.25;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #ffffff;
    font-size: 18px;
  }

  .check-box {
    width: 20px;
    height: 20px;
    border: 2px solid #f5a623;
    border-radius: 3px;
  }

  /* 上部の細いバー */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #f5a623, #f7c948, #f5a623);
  }

  /* FP バッジ */
  .fp-badge {
    position: absolute;
    top: 40px;
    right: 60px;
    background: rgba(245, 166, 35, 0.15);
    border: 2px solid rgba(245, 166, 35, 0.6);
    border-radius: 8px;
    padding: 10px 20px;
    color: #f5a623;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="top-bar"></div>
  <div class="accent-bar"></div>

  <div class="fp-badge">現役 FP</div>

  <div class="content">
    <div class="text-block">
      <div class="tag">実体験レポート</div>
      <div class="main-text">
        <div class="line1">実の母親を</div>
        <div class="line2">交通事故で亡くして</div>
        <div class="line3">すぐに取った</div>
        <div class="line4">行動の一覧</div>
      </div>
      <div class="sub-text">誰も教えてくれなかった、死後手続きのリアル</div>
    </div>

    <div class="icon-block">
      <div class="icon-circle">📋</div>
      <div class="icon-label">保存版</div>
    </div>
  </div>

  <div class="checklist">
    <div class="check-item"><div class="check-box"></div><span>死亡診断書の取得</span></div>
    <div class="check-item"><div class="check-box"></div><span>保険会社への連絡</span></div>
    <div class="check-item"><div class="check-box"></div><span>相続手続き</span></div>
    <div class="check-item"><div class="check-box"></div><span>年金の停止申請</span></div>
  </div>
</body>
</html>
